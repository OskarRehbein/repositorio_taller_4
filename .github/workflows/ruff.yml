name: test accion ruff
on: 
  push:
    branches: [ main ]

  jobs: 
    test:
      runs on: ${{ matrix.os }}
      strategy:
        matrix:
          os: [ubuntu-24.04 , ubuntu-22.04]
          python-version: ['3.8' , '3.12']
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: ${{ matrix.python-version }}
